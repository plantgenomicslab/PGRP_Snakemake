  memory: 64g
convertSRAtoFastq_PAIRED:
  ncpus: 8
  memory: 64g
fastqc_raw_SINGLE:
  ncpus: 2
  memory: 8g
fastqc_raw_PAIRED:
  ncpus: 2
  memory: 8g
fastqc_raw:
  ncpus: 2
  memory: 8g
trim_SINGLE:
  ncpus: 16
  memory: 64g
trim_PAIRED:
  ncpus: 16
  memory: 64g
fastqc_trim_SINGLE:
